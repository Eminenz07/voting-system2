<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AU Vote — Elections</title>
<meta name="description" content="Browse all active elections at Adeleke University and cast your vote."/>
<link rel="stylesheet" href="/assets/css/app.css"/>
<style>
.page-hero {
    background: linear-gradient(135deg, var(--au-blue) 0%, var(--au-blue-dark) 100%);
    border-radius: var(--radius-xl);
    padding: 1.75rem 2rem;
    color: #fff;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
}
.page-hero::after {
    content: '';
    position: absolute;
    right: -2rem; top: -2rem;
    width: 10rem; height: 10rem;
    border-radius: 50%;
    background: rgba(245,180,0,.08);
}
.filter-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
.filter-btn {
    padding: .5rem 1rem;
    border-radius: var(--radius-full);
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: .8125rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-2);
    transition: all .15s;
}
.filter-btn:hover { border-color: var(--au-blue); color: var(--au-blue); }
.filter-btn.active { background: var(--au-blue); color: #fff; border-color: var(--au-blue); }
.elections-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(20rem,1fr)); gap:1.25rem; }
.election-meta { display:flex; align-items:center; gap:.5rem; font-size:.8125rem; color:var(--text-3); margin-bottom:.5rem; }
.election-meta .material-symbols-outlined { font-size:1rem; }
.no-results {
    text-align:center; padding:4rem 2rem; color:var(--text-3);
}
.no-results .material-symbols-outlined { font-size:4rem; display:block; margin-bottom:1rem; opacity:.4; }
.voted-badge {
    display:inline-flex; align-items:center; gap:.25rem;
    padding:.25rem .75rem; border-radius:var(--radius-full);
    background:var(--success-bg); color:var(--success);
    font-size:.75rem; font-weight:700;
}
</style>
</head>
<body>
<div class="app-shell">
    <header class="app-header">
        <a href="/student/dashboard.html" class="brand">
            <img src="/assets/au-logo.png" class="brand-logo" alt="AU" onerror="this.style.display='none'"/>
            <div>
                <div class="brand-name">Adeleke University</div>
                <div class="brand-sub">E-Voting System</div>
            </div>
        </a>
        <div class="header-actions">
            <button class="icon-btn" onclick="DarkMode.toggle()" title="Toggle dark mode">
                <span class="material-symbols-outlined">dark_mode</span>
            </button>
            <div class="user-chip">
                <div class="user-chip-avatar" id="avatar-initials">—</div>
                <span id="user-name-chip">Loading…</span>
            </div>
            <button class="icon-btn" onclick="Auth.logout()" title="Sign out">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </header>

    <aside class="app-sidebar" id="sidebar"></aside>

    <main class="app-main">
        <div class="page-hero">
            <div style="position:relative;z-index:1">
                <h1 style="color:#fff;font-size:1.625rem;margin-bottom:.25rem">Elections</h1>
                <p style="opacity:.8;font-size:.9375rem">Browse and participate in active elections</p>
            </div>
        </div>

        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="university">University</button>
            <button class="filter-btn" data-filter="faculty">Faculty</button>
            <button class="filter-btn" data-filter="departmental">Departmental</button>
        </div>

        <div id="elections-container">
            <div class="elections-grid">
                <div class="card skeleton" style="height:14rem"></div>
                <div class="card skeleton" style="height:14rem"></div>
                <div class="card skeleton" style="height:14rem"></div>
            </div>
        </div>
    </main>
</div>

<script src="/assets/js/app.js"></script>
<script>
let allElections = [];

document.addEventListener('DOMContentLoaded', async () => {
    const user = Auth.requireStudent();
    if (!user) return;

    document.getElementById('sidebar').appendChild(Nav.student('elections'));
    document.getElementById('user-name-chip').textContent = user.full_name || user.first_name;
    const initials = ((user.first_name?.[0] || '') + (user.last_name?.[0] || '')).toUpperCase() || '?';
    document.getElementById('avatar-initials').textContent = initials;

    // Filter buttons
    document.getElementById('filter-bar').addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderElections(btn.dataset.filter);
    });

    try {
        allElections = await API.get('/elections/');
        renderElections('all');
    } catch {
        Toast.show('Failed to load elections.', 'error');
    }
});

function renderElections(filter) {
    let filtered = allElections;
    if (filter === 'active') filtered = allElections.filter(e => e.status === 'active');
    else if (filter === 'completed') filtered = allElections.filter(e => e.status === 'completed');
    else if (filter === 'university') filtered = allElections.filter(e => e.election_type === 'university');
    else if (filter === 'faculty') filtered = allElections.filter(e => e.election_type === 'faculty');
    else if (filter === 'departmental') filtered = allElections.filter(e => e.election_type === 'departmental');

    const container = document.getElementById('elections-container');
    if (!filtered.length) {
        container.innerHTML = `<div class="no-results">
            <span class="material-symbols-outlined">search_off</span>
            <h3 style="margin-bottom:.5rem">No elections found</h3>
            <p>Try a different filter or check back later.</p>
        </div>`;
        return;
    }

    container.innerHTML = `<div class="elections-grid">${filtered.map(e => {
        const scope = e.election_type === 'university' ? 'University-wide' :
                      e.election_type === 'faculty' ? 'Faculty: ' + e.faculty_scope :
                      'Department: ' + e.department_scope;
        const isActive = e.status === 'active';
        return `
        <div class="election-card">
            <div class="election-card-header">
                <div class="flex items-center justify-between gap-2 mb-2">
                    ${statusBadge(e.status)}
                    <span style="font-size:.8125rem;opacity:.75">${isActive ? elapsedLabel(e.end_date) : formatDateShort(e.end_date)}</span>
                </div>
                <h3 style="color:#fff;font-size:1.125rem;margin-bottom:.25rem">${e.title}</h3>
                <p style="font-size:.8125rem;opacity:.75">${scope}</p>
            </div>
            <div class="election-card-body">
                <p class="text-sm text-muted" style="margin-bottom:.75rem;line-height:1.5">${e.description ? e.description.slice(0,120) + (e.description.length > 120 ? '…' : '') : 'No description provided.'}</p>
                <div class="election-meta">
                    <span class="material-symbols-outlined">group</span>
                    <strong>${e.total_votes || 0}</strong> votes cast
                    <span style="margin:0 .25rem">·</span>
                    <span class="material-symbols-outlined">assignment</span>
                    ${e.positions_count || 0} position(s)
                </div>
            </div>
            <div class="election-card-footer">
                ${e.has_voted ? '<span class="voted-badge"><span class="material-symbols-outlined" style="font-size:.875rem">check_circle</span> Voted</span>' : ''}
                ${isActive && !e.has_voted
                    ? `<a href="/student/ballot.html?id=${e.id}" class="btn btn-primary btn-sm" style="margin-left:auto">Vote Now <span class="material-symbols-outlined" style="font-size:1rem">arrow_forward</span></a>`
                    : e.status === 'completed' && e.results_published
                    ? `<a href="/student/results.html?id=${e.id}" class="btn btn-outline btn-sm" style="margin-left:auto">View Results</a>`
                    : e.status === 'completed'
                    ? '<span class="badge badge--pending" style="margin-left:auto">Results Pending</span>'
                    : e.has_voted
                    ? `<a href="/student/results.html?id=${e.id}" class="btn btn-ghost btn-sm" style="margin-left:auto">View Details</a>`
                    : ''}
            </div>
        </div>`;
    }).join('')}</div>`;
}
</script>
</body>
</html>
